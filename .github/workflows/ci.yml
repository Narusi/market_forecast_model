name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      run_notebook_smoke:
        description: "Run optional notebook smoke test job"
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: "3.11"
  COVERAGE_MIN: "80"

jobs:
  quality-and-tests:
    name: Lint, type-check, and test (py${{ env.PYTHON_VERSION }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements/dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Ruff
        run: ruff check .

      - name: Black (check)
        run: black --check .

      - name: Mypy
        run: mypy src

      - name: Pytest with coverage threshold
        run: |
          pytest \
            --junitxml=pytest-junit.xml \
            --cov=src/market_forecast \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=${COVERAGE_MIN}

      - name: Upload pytest and coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-py${{ env.PYTHON_VERSION }}
          path: |
            pytest-junit.xml
            coverage.xml
          if-no-files-found: error

  notebook-smoke:
    name: Notebook smoke test (optional)
    runs-on: ubuntu-latest
    needs: quality-and-tests
    if: github.event_name == 'workflow_dispatch' && inputs.run_notebook_smoke

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements/dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run notebook smoke execution
        run: |
          papermill notebooks/market_forecast_colab_demo.ipynb \
            notebooks/.ci_market_forecast_colab_demo.ipynb \
            -k python3

      - name: Upload executed notebook artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notebook-smoke-artifact
          path: notebooks/.ci_market_forecast_colab_demo.ipynb
          if-no-files-found: error
